name: Build and Publish Storybook to GitHub Pages

on:
  push:
    branches: [ "development" ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: bitovi/github-actions-storybook-to-github-pages@v1.0.3
        with:
          path: storybook-static
